## GODL Market Price

Fetch the current USD price of any token by mint address using the GODL price API:

```
GET https://godl.supply/api/price/{mintId}
```

Response: `{ "price": number }` — USD price of the token. Cached for 30s.

**Mint addresses:**

- SOL: `So11111111111111111111111111111111111111112`
- GODL: `GodL6KZ9uuUoQwELggtVzQkKmU1LfqmDokPibPeDKkhF`

```typescript
const SOL_MINT = 'So11111111111111111111111111111111111111112'
const GODL_MINT = 'GodL6KZ9uuUoQwELggtVzQkKmU1LfqmDokPibPeDKkhF'

async function getTokenPrices(): Promise<{
  solPrice: number
  godlPrice: number
}> {
  const [solRes, godlRes] = await Promise.all([
    fetch(`https://godl.supply/api/price/${SOL_MINT}`),
    fetch(`https://godl.supply/api/price/${GODL_MINT}`),
  ])
  const solData = await solRes.json()
  const godlData = await godlRes.json()
  return {
    solPrice: solData.price ?? 0,
    godlPrice: godlData.price ?? 0,
  }
}
```

