## EV & Production Cost

### What is Production Cost?

The **production cost** of 1 GODL is the expected USD cost to mine it. Compare this to the market price of GODL to determine if mining is profitable.

- **If production cost < market price** → mining is profitable (buy pressure via mining)
- **If production cost > market price** → mining is unprofitable (better to buy GODL on market)

### EV Formula

The expected value (production cost) of 1 GODL in USD:

```
EV = (0.1 × solDeployed) / (8 + motherlode / 625) × solPrice
```

Where:

- `solDeployed` — total SOL deployed in the current round (in SOL, not lamports)
- `motherlode` — treasury motherlode value, converted: `Number(treasury.motherlode) / 1e11`
- `solPrice` — current SOL price in USD (from Jupiter API)
- `0.1` — fraction of deployed SOL that goes to GODL production cost
- `8` — base divisor constant
- `625` — motherlode scaling factor

### Profitability

```
profitabilityPercent = ((godlPrice - EV) / godlPrice) × 100
```

A positive value means mining is cheaper than buying. A negative value means it's cheaper to buy on the open market.

### Full Calculation

```typescript
// 1. Get current round data
const board = await sdk.getBoard()
const round = await sdk.getRound(board.roundId)
const solDeployed = round ? Number(round.totalDeployed) / 1e9 : 0

// 2. Get treasury motherlode
const treasury = await sdk.getTreasury()
const motherlode = Number(treasury.motherlode) / 1e11

// 3. Get prices
const { solPrice, godlPrice } = await getTokenPrices()

// 4. Calculate EV (production cost of 1 GODL in USD)
const expectedValue = ((0.1 * solDeployed) / (8 + motherlode / 625)) * solPrice

// 5. Calculate profitability
const profitabilityPercent = godlPrice > 0 ? ((godlPrice - expectedValue) / godlPrice) * 100 : 0

console.log(`GODL market price: $${godlPrice}`)
console.log(`GODL production cost: $${expectedValue}`)
console.log(`Profitability: ${profitabilityPercent.toFixed(1)}%`)
```

