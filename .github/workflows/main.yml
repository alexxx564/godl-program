## PDA Derivation

All PDAs use `GODL_PROGRAM_ID` as the program. Seeds:

| Account       | Seeds                                  |
| ------------- | -------------------------------------- |
| Board         | `"board"`                              |
| Treasury      | `"treasury"`                           |
| Config        | `"config"`                             |
| SolMotherlode | `"sol_motherlode"`                     |
| Round         | `"round"` + roundId (u64 LE)           |
| Miner         | `"miner"` + authority (32 bytes)       |
| Automation    | `"automation_v2"` + authority          |
| Stake V1      | `"stake"` + authority                  |
| Stake V2      | `"stake_v2"` + authority + id (u64 LE) |
| PoolRound     | `"pool_round"` + roundId (u64 LE)      |
| PoolMember    | `"pool_member"` + authority            |
| Referrer      | `"referrer"` + authority               |

```typescript
import {
  getBoardPda,
  getTreasuryPda,
  getConfigPda,
  getRoundPda,
  getMinerPda,
  getAutomationPda,
  getStakePda,
  getStakeV2Pda,
  getPoolRoundPda,
  getPoolMemberPda,
  getGodlAta,
} from '@zenx-labs/godl-supply'

const [boardKey, bump] = getBoardPda()
const [minerKey, bump] = getMinerPda(publicKey)
const ata = await getGodlAta(address('owner...'))
```

