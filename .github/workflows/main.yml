## Stream API

**Base URL:** `https://stream.godl.dev`

### Init Data

```
GET /api/init-data
```

Returns base64-encoded MessagePack for all accounts needed to bootstrap the client:

- `board`, `round`, `treasury`, `slotData`, `solMotherlode`, `poolRound`
