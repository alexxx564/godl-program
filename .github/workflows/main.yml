## Agent Workflow

```
1. INITIALISE
   npm i @zenx-labs/godl-supply

   const sdk = await GodlSupply.create("~/.config/solana/id.json", { rpcUrl })
   await sdk.connect()

   const board    = await sdk.getBoard()       // current round
   const treasury = await sdk.getTreasury()    // balances, motherlode, staking
   const config   = await sdk.getConfig()      // godlPerRound, varAddress

   // Listen for real-time updates
   sdk.on('round', (round) => { ... })         // grid state
   sdk.on('resetEvent', (event) => { ... })    // round results
   sdk.on('solMotherlode', (m) => { ... })     // jackpot tracking

2. EACH ROUND (slot-based, ~seconds)
   a. Observe: 'round' events show real-time grid (deployed[25], count[25])
   b. Track timing: board.endSlot - sdk.getSlot() = slots remaining
   c. Analyse: Which squares are least crowded? What's the motherlode?
   d. Decide: Choose squares + SOL amount (or skip)
   e. Execute:
      // amount is lamports PER SQUARE — total SOL = amount × squares.length
      const txSig = await sdk.deploy({
        amount: lamportsPerSquare,
        squares: [0, 5, 12],
        varAddress: address(config.varAddress),
      })
   f. Wait: 'resetEvent' shows winningSquare and your rewards

3. CLAIM REWARDS (periodically)
   const miner = await sdk.getMiner()
   if (miner.rewardsSol > 0n) {
     await sdk.claim({ claimSol: true })
   }
   if (miner.rewardsGodl > 0n) {
     await sdk.claim({ claimGodl: true })
   }

4. MANAGE GODL
   // Stake for yield
   await sdk.stakeV2Deposit(0n, amount, lockDuration)
   // Compound periodically
   await sdk.stakeV2CompoundYield(0n)
   // Check position
   const stake = await sdk.getStakeV2(0n)
   // NFT boost if available
   await sdk.stakeNft(0n, nftAsset)

5. AUTOMATION (optional)
   await sdk.setupAutominer({
     amount: 500_000,
     deposit: 5_000_000,
     squares: [0, 5, 12, 18, 24],
     strategy: 1,
     numRounds: 100,
   })
   // Monitor
   const auto = await sdk.getAutomation()
   // Stop when done
   await sdk.stopAutominer()

6. RECONNECT
   sdk.on('connected', (connected) => {
     if (!connected) {
       // WebSocket auto-reconnects (max 10 attempts, 3s interval)
       // Manual reconnect if needed:
       await sdk.connect()
     }
   })
   sdk.on('error', (err) => { ... })
```

