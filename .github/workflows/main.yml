## Critical Rules

1. **One deploy per round** — must checkpoint previous round first if `checkpointId !== roundId`. SDK handles this automatically.
2. **Square indices 0–24** — encoded as bitmask internally. Invalid indices will produce incorrect masks.
3. **Automation fee**: 30,000 lamports per round, added on top of your deposit.
