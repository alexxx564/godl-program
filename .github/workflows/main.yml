## Data Model

| Constant          | Value                 | Note                                              |
| ----------------- | --------------------- | ------------------------------------------------- |
| GODL_DECIMALS     | 11                    | GODL token decimals                               |
| GRID_SIZE         | 25 (5x5)              | Square IDs 0–24                                   |
| ROUND_DURATION    | Slot-based            | Defined by `board.startSlot` to `board.endSlot`   |
| SLOT_DURATION     | ~400ms                | Solana slot time                                  |
| AUTOMATION_FEE    | 30,000 lamports/round | Per-round fee for autominer                       |
| CACHE_TTL         | 15 seconds            | In-memory cache expiry for account data           |
| Deploys per round | 1 per user            | Checkpoint required if `checkpointId !== roundId` |

